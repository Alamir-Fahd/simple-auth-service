services:
  # 1. Redis: High-speed cache for credit-bureau responses
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. Temporal: Durable workflow execution engine
  temporal:
    image: temporalio/admin-tools:latest
    command: ["temporal", "server", "start-dev", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233" 
      - "8233:8233" 
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 3. Loan Service: The only code you write
  loan-service:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - TEMPORAL_ADDRESS=temporal:7233
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
